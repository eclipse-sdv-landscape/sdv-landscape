# Landscape2 guide
#
# This file allows defining the content of the landscape guide.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/guide.yml

categories:
  - category: AI
    content: |
      The AI category includes technologies that enable artificial intelligence
      and machine learning capabilities in Software-Defined Vehicles.
      
      It supports data-driven vehicle functions such as perception, prediction,
      and optimization across in-vehicle and cloud environments.
    subcategories:
      - subcategory: AI
        content: |
          See main description
  - category: Tooling Devops
    content: |
      Tooling & DevOps covers all tools and platforms that support the complete
      lifecycle of Software-Defined Vehicles (SDVs) – from architecture and
      development to testing, deployment, and operations.

      This category addresses the increasing complexity of SDV systems and enables
      scalable, automated, and repeatable development processes across teams
      and organizations.
    subcategories:
      - subcategory: Design
        content: |
          Design tools support architecture, system, and software design for
          Software-Defined Vehicles. They act as a “single source of truth” for
          system models and enable early validation of dependencies, resource usage,
          safety, and security aspects.

          Typical use cases include model-based systems engineering (MBSE),
          architecture reviews, and system-level simulations.

      - subcategory: Development
        content: |
          Development tools accelerate the implementation of in-vehicle software
          and cloud-based vehicle services. They provide SDKs, frameworks, CLIs,
          and development environments for modern, service-oriented vehicle software.

          The primary focus is on developer experience, reusability, and
          cloud-native development workflows.

      - subcategory: Testing & Validation
        content: |
          This subcategory includes tools for simulation, test automation, and
          validation of vehicle software. It supports SIL, HIL, and virtual test
          environments to enable early detection of defects.

          Testing & Validation is a key enabler for continuous integration and
          functional safety in SDV architectures.
      - subcategory: Process & Frameworks
        content: |
          The Process & Frameworks category covers methodologies, reference
          frameworks, and governance models that support the structured development,
          operation, and evolution of Software-Defined Vehicle (SDV) platforms.

          It includes processes for software lifecycle management, collaboration,
          compliance, and standardization, as well as frameworks that enable
          consistent implementation across projects and organizations.

          Process & Frameworks provide the foundation for scalable development,
          interoperability, and long-term maintainability of SDV ecosystems.

      - subcategory: Deployment
        content: |
          Deployment solutions enable the secure rollout, update, and management
          of software on vehicles and edge systems. This includes OTA mechanisms,
          application deployment, and lifecycle management.

          They form the bridge between cloud-based development and in-vehicle
          runtime environments.

  - category: Service Fabric and Communication
    content: |
      This category describes the foundational communication and integration
      layer of Software-Defined Vehicles. It ensures that services, ECUs, and
      external systems can communicate efficiently, securely, and at scale.

      Service Fabric and Communication components are essential for building
      modular, distributed, and service-oriented SDV platforms.
    subcategories:
      - subcategory: Middleware & Frameworks
        content: |
          Middleware abstracts underlying vehicle hardware and communication
          mechanisms. It provides unified APIs for data access, service interaction,
          and vehicle functions.

          Frameworks in this subcategory form the basis for portable and
          service-oriented vehicle software architectures.
      - subcategory: Service Mesh
        content: |
          The Service Mesh category covers technologies that manage and secure
          service-to-service communication within Software-Defined Vehicle (SDV)
          platforms.

          A service mesh provides dedicated infrastructure capabilities such as
          service discovery, traffic management, observability, and policy
          enforcement, independent of application logic.

          In SDV architectures, service meshes enable reliable and scalable
          communication between distributed vehicle services across ECUs, zones,
          edge nodes, and cloud environments, while supporting security,
          resilience, and operational visibility.

      - subcategory: Communication Protocols
        content: |
          Communication protocols define how data and services are exchanged
          between vehicle components, edge nodes, and cloud systems.

          The focus is on scalability, real-time capabilities, and
          transport-agnostic communication.

      - subcategory: Digital Twin
        content: |
          Digital Twin technologies represent the state and capabilities of a
          vehicle or vehicle system in digital form. They enable simulation,
          analysis, and control throughout the entire lifecycle.

          Digital twins are a key concept for modern Software-Defined Vehicle
          platforms and cloud-to-vehicle integration.

  - category: Runtime and Orchestration
    content: |
      This category focuses on the execution of software inside the vehicle.
      It includes runtime environments, orchestration, and service management
      across multiple ECUs and computing platforms.

      Runtime and Orchestration solutions enable dynamic, flexible, and
      maintainable SDV software deployments.
    subcategories:
      - subcategory: Workload & Container Orchestration
        content: |
          Orchestration platforms manage the execution, scaling, and interaction
          of software workloads in the vehicle. They enable containerized and
          service-oriented architectures even in resource-constrained environments.

          The goal is deterministic, secure, and manageable operation of
          Software-Defined Vehicle software.

  - category: Distributions and Frameworks
    content: |
      This category includes complete software stacks, reference platforms,
      and frameworks for Software-Defined Vehicles. They combine operating
      systems, middleware, and management components into integrated SDV
      platforms.

      Distributions and frameworks accelerate adoption and provide a solid
      foundation for building SDV solutions.
    subcategories:
      - subcategory: Distributions
        content: |
          This category includes complete software stacks, reference platforms,
          and frameworks for Software-Defined Vehicles. They combine operating
          systems, middleware, and management components into integrated SDV
          platforms.

  - category: RTOS
    content: |
      Real-Time Operating Systems (RTOS) provide deterministic execution,
      low latency, and high reliability for safety-critical vehicle functions.

      RTOS form the foundation for time-critical control and real-time
      applications in Software-Defined Vehicles.
    subcategories:
      - subcategory: RTOS
        content: |
          See main description      

  - category: Example Applications
    content: |
      Example Applications demonstrate concrete use cases and reference
      implementations for Software-Defined Vehicles. They show how SDV
      building blocks can be combined in real-world scenarios.

      They serve as learning resources and entry points for developers,
      architects, and system integrators.
    subcategories:
      - subcategory: Example Applications
        content: |
          See main description
