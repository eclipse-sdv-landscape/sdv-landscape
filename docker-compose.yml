volumes:
  l2_site: {}

services:
  l2-build:
    image: ${LANDSCAPE2_IMAGE:?set via --env-file}
    user: "0:0"
    working_dir: /work
    volumes:
      - .:/work:ro
      - l2_site:/out
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - "landscape2 build --data-file /work/data.yml --settings-file /work/settings.yml --guide-file /work/guide.yml --games-file /work/games.yml --logos-path /work/logos --output-dir /out/sdv-landscape && for f in /out/sdv-landscape/assets/Content-*.js; do [ -f \"$$f\" ] && sed -i 's/new se(location.origin)/new se(location.origin+window.baseDS.base_path)/g' \"$$f\"; done && rm -rf /out/data && cp -a /out/sdv-landscape/data /out/data"

  l2-serve:
    image: ${LANDSCAPE2_IMAGE:?set via --env-file}
    volumes:
      - l2_site:/site:ro
    ports: ["8000:8000"]
    entrypoint: ["landscape2"]
    command: ["serve", "--addr", "0.0.0.0:8000", "--landscape-dir", "/site"]
    init: true

  # export tar to stdout; host extracts so host owns files
  l2-export:
    image: busybox:1.36
    volumes:
      - l2_site:/site:ro
    entrypoint: ["tar"]
    command: ["-C","/site","-cf","-","."]
