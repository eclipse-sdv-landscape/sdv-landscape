name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write
  packages: read

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    name: Build and Deploy PR Preview
    runs-on: ubuntu-latest
    env:
      PREVIEW_PATH: pr-preview/pr-${{ github.event.pull_request.number }}
      PREVIEW_URL: https://eclipse-sdv-landscape.github.io/sdv-landscape/pr-preview/pr-${{ github.event.pull_request.number }}/
      PREVIEW_BASE_PATH: /sdv-landscape/pr-preview/pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset compose state
        run: |
          docker compose down --volumes --remove-orphans || true
          rm -rf build && mkdir -p build

      - name: Update base_path for preview
        run: |
          sed -i "s|^base_path:.*|base_path: ${PREVIEW_BASE_PATH}|" settings.yml

      - name: Build (to named volume)
        run: docker compose --env-file .env.stable run --rm l2-build

      - name: Export to ./build (host-owned files)
        run: docker compose --env-file .env.stable run --rm l2-export | tar -C build -xf -

      - name: Fix relative paths for subpath deployment
        run: |
          # Add <base> tag to index.html for relative path resolution
          sed -i "s|</head>|<base href=\"${PREVIEW_BASE_PATH}/\" /></head>|" build/index.html
          
          # Also add to 404.html
          cp build/index.html build/404.html

      - name: SPA fallback for GitHub Pages
        run: |
          # Ensure 404.html exists for GitHub Pages SPA routing
          [ -f build/404.html ] || cp build/index.html build/404.html

      - name: Deploy preview to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ${{ env.PREVIEW_PATH }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
        with:
          script: |
            const body = `Preview is ready: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- pr-preview-link -->';
            const taggedBody = `${marker}\n${body}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: taggedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: taggedBody,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    name: Cleanup PR Preview
    runs-on: ubuntu-latest
    env:
      PREVIEW_PATH: pr-preview/pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview folder from gh-pages
        run: |
          if [ -d "${PREVIEW_PATH}" ]; then
            rm -rf "${PREVIEW_PATH}"
            echo "Removed ${PREVIEW_PATH}"
          else
            echo "Nothing to remove for ${PREVIEW_PATH}"
          fi

          if [ -d "pr-preview" ] && [ -z "$(ls -A pr-preview)" ]; then
            rmdir pr-preview
            echo "Removed empty pr-preview directory"
          fi

      - name: Commit and push cleanup changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No changes to commit"
          fi
