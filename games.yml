# yaml-language-server: $schema=https://cncf.github.io/landscape2/config/schema/games.schema.json

# Landscape games data
#
# This file contains the data used in the landscape quiz game. We use it as a
# lightweight interactive solution finder by asking need-based questions that
# map users to a strong first-fit Eclipse SDV project.

quiz:
  questions:
    - title: "I need an end-to-end development toolchain for vehicle applications. Which project is the best starting point?"
      options:
        - item: Eclipse Velocitas
          correct: true
        - item: Eclipse Open Vehicle API
        - item: Eclipse SDV Developer Console
        - item: Eclipse Autowrx

    - title: "I need a shared vehicle abstraction interface for signal- and event-driven functions. Which project should I start with?"
      options:
        - item: Eclipse Open Vehicle API
          correct: true
        - item: Eclipse SDV Developer Console
        - item: Eclipse Kuksa
        - item: Eclipse Chariott

    - title: "I need SIL/HIL simulation on a PC to validate embedded software early. Which project fits best?"
      options:
        - item: Eclipse OpenXilEnv
          correct: true
        - item: Eclipse openDuT
        - item: Eclipse Ambient Light Services
        - item: Eclipse ArchE

    - title: "I need automated testing and validation workflows across targets. Which project is the best first match?"
      options:
        - item: Eclipse openDuT
          correct: true
        - item: Eclipse OpenXilEnv
        - item: Eclipse Pullpiri
        - item: Eclipse OpenSOVD

    - title: "I need an in-vehicle data orchestration layer. Which project should I explore first?"
      options:
        - item: Eclipse Kuksa
          correct: true
        - item: Eclipse Open Vehicle API
        - item: Eclipse Chariott
        - item: Eclipse Zenoh

    - title: "I need middleware to connect vehicle and cloud services through a metadata-driven abstraction layer. Which project fits best?"
      options:
        - item: Eclipse Chariott
          correct: true
        - item: Eclipse uProtocol
        - item: Eclipse eCAL (enhanced Communication Abstraction Layer)
        - item: Eclipse Open Vehicle API

    - title: "I need workload orchestration across vehicle nodes or VMs. Which project is the best starting point?"
      options:
        - item: Eclipse Ankaios
          correct: true
        - item: Eclipse Pullpiri
        - item: Eclipse Muto
          category: Tooling Devops
          subcategory: Deployment
        - item: Eclipse BlueChi™

    - title: "I need a cohesive SDV stack, reference platform, or blueprint. Which project is the best first stop?"
      options:
        - item: Eclipse Leda
          correct: true
        - item: Eclipse SDV Blueprints
        - item: Eclipse Safe Open Vehicle Core
        - item: Eclipse Automotive API Framework

    - title: "I want to explore AI capabilities for SDV. Which project should I start with?"
      options:
        - item: Eclipse LMOS
          correct: true
        - item: Eclipse Trustable Software Framework
        - item: Eclipse OpenXilEnv
        - item: Eclipse Leda Incubator
